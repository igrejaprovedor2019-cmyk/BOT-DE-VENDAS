<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sirius Bot Maker</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f10; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #161618; padding: 40px; border-radius: 15px; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #222; text-align: center; }
        h1 { color: #00c853; margin-bottom: 10px; font-size: 24px; }
        p { color: #888; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #0a0a0b; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00c853; }
        button { width: 100%; padding: 14px; background: #00c853; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00e676; transform: translateY(-2px); }
        #log { margin-top: 20px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sirius Maker</h1>
        <p>Ative seu bot de vendas em segundos</p>
        <input type="text" id="token" placeholder="Token do Bot (Discord Developer Portal)">
        <input type="text" id="nomeLoja" placeholder="Nome da sua Loja">
        <button onclick="ligarBot()">ATIVAR SISTEMA DE VENDAS</button>
        <div id="log"></div>
    </div>

    <script>
        async function ligarBot() {
            const token = document.getElementById('token').value;
            const nomeLoja = document.getElementById('nomeLoja').value;
            const log = document.getElementById('log');

            if(!token || !nomeLoja) return log.innerText = "Preencha todos os campos!";
            
            log.style.color = "#aaa";
            log.innerText = "Conectando ao Discord...";

            try {
                const response = await fetch('/ligar-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nomeLoja })
                });
                const data = await response.json();
                
                if(data.erro) {
                    log.style.color = "#ff5252";
                    log.innerText = data.erro;
                } else {
                    log.style.color = "#00c853";
                    log.innerText = "✅ BOT ONLINE! Vá ao Discord e use !vendas";
                }
            } catch (err) {
                log.innerText = "Erro ao falar com o servidor.";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Sirius Maker</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f10; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #161618; padding: 40px; border-radius: 15px; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #222; text-align: center; }
        h1 { color: #00c853; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #0a0a0b; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: #00c853; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00e676; }
        #log { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sirius Maker</h1>
        <p>Ative seu sistema profissional</p>
        <input type="text" id="token" placeholder="Token do Bot">
        <input type="text" id="nomeLoja" placeholder="Nome da Loja">
        <button onclick="ligar()">ATIVAR BOT</button>
        <div id="log"></div>
    </div>
    <script>
        async function ligar() {
            const token = document.getElementById('token').value;
            const nomeLoja = document.getElementById('nomeLoja').value;
            const log = document.getElementById('log');
            log.innerText = "⏳ Conectando e registrando comandos...";
            try {
                const res = await fetch('/ligar-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nomeLoja })
                });
                const data = await res.json();
                log.innerText = data.msg || data.erro;
                log.style.color = data.erro ? "red" : "#00c853";
            } catch (e) { log.innerText = "Erro ao conectar."; }
        }
    </script>
</body>
</html>

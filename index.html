<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard GBZ</title>
    <style>
        body { background: #0a0a0b; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #151517; padding: 30px; border-radius: 15px; width: 350px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff6a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00d659; transform: scale(1.02); }
        h2 { text-align: center; color: #00ff6a; margin-top: 0; }
    </style>
</head>
<body>
    <div class="box">
        <h2>SIRIUS CONFIG</h2>
        <input type="text" id="t" placeholder="Token do Bot">
        <input type="text" id="n" placeholder="Nome da Loja">
        <input type="text" id="p" placeholder="Chave PIX">
        <input type="text" id="b" placeholder="URL do Banner (Fim .png ou .jpg)">
        <button onclick="ligar()">ATIVAR BOT AGORA</button>
        <p id="s" style="text-align:center; font-size:12px; margin-top:10px;"></p>
    </div>
    <script>
        async function ligar() {
            const s = document.getElementById('s');
            s.innerText = "⏳ Iniciando...";
            const res = await fetch('/ligar-bot', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: document.getElementById('t').value,
                    nomeLoja: document.getElementById('n').value,
                    pix: document.getElementById('p').value,
                    banner: document.getElementById('b').value
                })
            });
            const data = await res.json();
            s.innerText = data.msg ? "✅ " + data.msg : "❌ Erro";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Painel de Controle GBZ</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1c; padding: 30px; border-radius: 15px; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #0a0a0b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff6a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #00d659; }
        h2 { text-align: center; color: #00ff6a; margin-top: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>GBZ CONFIG</h2>
        <input type="text" id="token" placeholder="Token do Bot">
        <input type="text" id="nome" placeholder="Nome da Loja (Ex: GBZ Store)">
        <input type="text" id="pix" placeholder="Chave PIX">
        <input type="text" id="banner" placeholder="Link do Banner (URL da Imagem)">
        <button onclick="configurar()">LIGAR BOT PREMIUM</button>
        <p id="msg" style="text-align: center; margin-top: 15px; font-size: 14px;"></p>
    </div>
    <script>
        async function configurar() {
            const status = document.getElementById('msg');
            status.innerText = "⏳ Iniciando...";
            const res = await fetch('/ligar-bot', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: document.getElementById('token').value,
                    nomeLoja: document.getElementById('nome').value,
                    pix: document.getElementById('pix').value,
                    banner: document.getElementById('banner').value
                })
            });
            const data = await res.json();
            status.innerText = data.msg || "Erro ao ligar!";
        }
    </script>
</body>
</html>
